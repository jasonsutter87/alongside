{{ define "main" }}
<div class="container py-5 text-center" style="max-width: 720px;">
  <p class="text-uppercase fw-bold text-muted" style="letter-spacing: 2px; font-size: 0.75rem;">Prototype</p>
  <h1 class="mb-3">{{ .Title }}</h1>
  <p class="lead text-muted mb-4">
    The full clickable flow — onboarding, the first five minutes, the earned reveal, friends &amp; clubs, and the live map.
    Scripted partner, no account needed. This is the vibe, not the finished product.
  </p>
  <a href="/app/" target="_blank" rel="noopener"
     class="btn btn-primary px-4 py-2 mb-4">Open in a new tab &rarr;</a>
</div>

<div class="d-flex justify-content-center pb-5 px-3">
  <iframe
    src="/app/"
    title="Alongside interactive demo"
    loading="lazy"
    style="width: 100%; max-width: 480px; height: 860px; border: 1px solid #e0d4c1; border-radius: 24px; box-shadow: 0 30px 60px -30px rgba(80,60,40,.4);">
  </iframe>
</div>
{{ end }}

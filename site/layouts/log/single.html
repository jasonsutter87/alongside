{{ define "main" }}
<article class="container py-5" style="max-width: 720px;">
  <a href="/log/" class="text-decoration-none text-muted small">&lsaquo; Build Log</a>

  <header class="mt-3 mb-4">
    <div class="text-uppercase fw-bold text-muted" style="letter-spacing: 2px; font-size: 0.75rem;">
      {{ with .Params.day }}Day {{ . }} · {{ end }}{{ .Date.Format "January 2, 2006" }}
    </div>
    <h1 class="mt-2">{{ .Title }}</h1>
    {{ with .Description }}<p class="lead text-muted">{{ . }}</p>{{ end }}
  </header>

  <div class="log-prose">
    {{ .Content }}
  </div>

  <hr class="my-5">
  <p class="text-muted small mb-0">
    Building Alongside in public. Try the <a href="/demo/">demo</a> · read more in the <a href="/log/">log</a>.
  </p>
</article>

<style>
  .log-prose { font-size: 1.075rem; line-height: 1.7; }
  .log-prose h2 { margin-top: 2.4rem; margin-bottom: 0.8rem; font-weight: 600; }
  .log-prose h3 { margin-top: 1.8rem; margin-bottom: 0.6rem; font-weight: 600; font-size: 1.2rem; }
  .log-prose p, .log-prose ul, .log-prose ol { margin-bottom: 1.1rem; }
  .log-prose blockquote { border-left: 3px solid #d98b6b; padding-left: 1rem; color: #555; font-style: italic; margin: 1.5rem 0; }
  .log-prose code { background: #f0e6d8; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.9em; }
  .log-prose strong { font-weight: 600; }
</style>
{{ end }}

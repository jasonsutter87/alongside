{{ define "main" }}
<div class="container py-5" style="max-width: 760px;">
  <p class="text-uppercase fw-bold text-muted" style="letter-spacing: 2px; font-size: 0.75rem;">Alongside</p>
  <h1 class="mb-3">{{ .Title }}</h1>
  <div class="mb-5 text-muted">{{ .Content }}</div>

  {{ range .Pages.ByDate.Reverse }}
  <a href="{{ .Permalink }}" class="d-block text-decoration-none text-dark mb-4 pb-4 border-bottom">
    <div class="text-muted mb-1" style="font-size: 0.8rem;">
      {{ with .Params.day }}Day {{ . }} · {{ end }}{{ .Date.Format "Jan 2, 2006" }}
    </div>
    <h2 class="h4 mb-1">{{ .Title }}</h2>
    {{ with .Description }}<p class="text-muted mb-0">{{ . }}</p>{{ end }}
  </a>
  {{ end }}
</div>
{{ end }}

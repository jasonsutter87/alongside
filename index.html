<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alongside — Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500&display=swap');

  :root{
    --cream:#efe6d8; --cream-deep:#e7dccb; --paper:#f6efe4;
    --ink:#3a322b; --ink-soft:#8a7d6d;
    --rose:#f3d9d4; --rose-ink:#9c5d52;
    --sage:#dde4d3; --sage-ink:#5f7152;
    --terra:#d98b6b; --terra-deep:#c9734f; --line:#e0d4c1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:28px;color:var(--ink)}
  .stage{display:flex;flex-direction:column;align-items:center;gap:14px}

  .phone{width:390px;height:810px;background:var(--paper);border-radius:46px;position:relative;overflow:hidden;
    box-shadow:0 40px 80px -30px rgba(80,60,40,.45),0 0 0 11px #ded2bf,0 0 0 13px #cdbfa8}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:30px;background:#1c1714;border-radius:18px;z-index:9}
  .statusbar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;
    font-size:14px;font-weight:600;position:relative;z-index:5}
  .bars{font-size:12px;letter-spacing:1px}
  .screen{padding:4px 26px 24px;height:calc(100% - 52px);display:flex;flex-direction:column;position:relative;overflow-y:auto}
  .screen::-webkit-scrollbar{width:0}

  .brandmark{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--terra-deep);font-weight:600;text-align:center;margin:2px 0 0}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.12;margin:0}
  h2{font-family:'Fraunces',serif;font-weight:500;font-size:22px;line-height:1.15}
  .serif{font-family:'Fraunces',serif}
  .sub{font-size:14px;color:var(--ink-soft);line-height:1.55}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px}
  .grow{flex:1}

  .btn{border:none;border-radius:18px;padding:17px;font-size:16px;font-weight:600;font-family:'Inter';cursor:pointer;
    width:100%;transition:transform .15s,box-shadow .15s}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--terra);color:#fff;box-shadow:0 10px 24px -10px rgba(201,115,79,.75)}
  .btn.ghost{background:transparent;color:var(--ink-soft);font-weight:500}
  .btn.soft{background:rgba(255,255,255,.55);border:1px solid var(--line);color:var(--ink)}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:14px}

  .card{background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:20px;padding:20px;cursor:pointer;
    transition:transform .15s,box-shadow .15s,border-color .15s}
  .card:active{transform:scale(.99)}
  .card.pink{background:var(--rose)}
  .card.green{background:var(--sage)}
  .card .lbl{font-family:'Fraunces',serif;font-size:21px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .card .dsc{font-size:13.5px;color:var(--ink-soft);line-height:1.45}
  .blob{width:26px;height:26px;border-radius:50%;background:var(--terra);flex:0 0 26px}

  /* dot reveal */
  .dotwrap{position:relative}
  .dot{border-radius:50%;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.6),0 2px 8px -2px rgba(120,90,60,.4)}
  .dot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#caa86a;
    filter:blur(13px) saturate(0) brightness(1.02);transform:scale(1.25);
    transition:filter 1.1s cubic-bezier(.4,0,.2,1),transform 1.1s cubic-bezier(.4,0,.2,1)}
  .dot .veil{position:absolute;inset:0;background:#caa86a;mix-blend-mode:color;transition:opacity 1.1s ease}

  .partner{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.45);border:1px solid var(--line);
    border-radius:16px;padding:11px 14px;margin-bottom:16px}
  .partner .dotwrap,.partner .dot{width:46px;height:46px;flex:0 0 46px}
  .partner .who{font-size:13px;color:var(--ink-soft);line-height:1.45}
  .partner .who b{color:var(--ink);font-weight:600}

  .roundlabel{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--terra-deep);font-weight:600}
  .pips{display:flex;gap:6px}
  .pip{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .pip.on{background:var(--terra)}
  .rowtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px}

  .prompt{font-family:'Fraunces',serif;font-style:italic;color:var(--terra-deep);font-size:22px;text-align:center;margin-bottom:26px}
  .opt{border-radius:20px;padding:22px;font-family:'Fraunces',serif;font-size:19px;line-height:1.3;cursor:pointer;
    border:1.5px solid transparent;transition:transform .18s,box-shadow .18s,border-color .18s;user-select:none}
  .opt:active{transform:scale(.98)}
  .opt.rose{background:var(--rose)} .opt.sage{background:var(--sage)}
  .opt.picked{border-color:var(--terra);box-shadow:0 8px 22px -10px rgba(201,115,79,.6)}
  .or{display:flex;align-items:center;justify-content:center;margin:12px 0}
  .or span{width:34px;height:34px;border-radius:50%;background:var(--paper);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--ink-soft)}
  .echo{text-align:center;font-size:13.5px;color:var(--ink-soft);margin-top:22px;min-height:20px;opacity:0;
    transition:opacity .5s;font-style:italic}
  .echo.show{opacity:1}

  .why{background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:16px;padding:14px 16px;
    font-family:'Fraunces',serif;font-size:14.5px;font-style:italic;color:var(--ink);line-height:1.45}
  .why b{font-style:normal;color:var(--rose-ink)}

  .reveal .dot img{filter:none!important;transform:none!important}
  .reveal .dot .veil{opacity:0!important}
  .heart{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--terra-deep);font-weight:600}

  /* scale */
  .poles{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;margin:2px 2px 12px}
  .scale{display:flex;flex-direction:column;gap:8px}
  .lvl{display:flex;align-items:center;gap:13px;border-radius:15px;padding:13px 15px;cursor:pointer;
    background:rgba(255,255,255,.42);border:1.5px solid var(--line);transition:transform .15s,border-color .15s,background .15s}
  .lvl:active{transform:scale(.99)} .lvl:hover{background:rgba(255,255,255,.7)}
  .lvl .num{flex:0 0 30px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-size:15px;color:var(--ink-soft);background:var(--cream);border:1px solid var(--line)}
  .lvl .lbl2{font-family:'Fraunces',serif;font-size:15px;line-height:1.3}
  .lvl.picked{border-color:var(--terra);background:rgba(217,139,107,.12)}
  .lvl.picked .num{background:var(--terra);color:#fff;border-color:var(--terra)}
  .meter{display:flex;gap:5px;justify-content:center;margin:14px 0 4px}
  .seg{width:36px;height:8px;border-radius:5px;background:var(--line)}
  .seg.you{background:var(--terra)} .seg.her{background:var(--sage-ink)}
  .seg.both{background:linear-gradient(90deg,var(--terra),var(--sage-ink))}
  .legend{display:flex;gap:16px;justify-content:center;font-size:12px;color:var(--ink-soft)}
  .legend i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .legend .sw{width:10px;height:10px;border-radius:3px;display:inline-block}

  .hubcard{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.5);border:1px solid var(--line);
    border-radius:18px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:transform .15s,box-shadow .15s}
  .hubcard:active{transform:scale(.99)} .hubcard:hover{box-shadow:0 8px 20px -12px rgba(120,90,60,.4)}
  .hubcard .ic{font-size:20px;flex:0 0 28px;text-align:center}
  .hubcard b{font-family:'Fraunces',serif;font-weight:500;font-size:16px;display:block}
  .hubcard span{font-size:12.5px;color:var(--ink-soft)}
  .hubcard .arr{margin-left:auto;color:var(--ink-soft)}

  .back{border:none;background:none;color:var(--ink-soft);font-size:14px;cursor:pointer;margin:4px 0 12px;padding:0}
  .fade{animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .restart{font-size:13px;color:var(--ink-soft);cursor:pointer;border:none;background:none;text-decoration:underline;text-underline-offset:3px}
  .cap{font-size:12px;color:var(--ink-soft);text-align:center;max-width:390px;line-height:1.5}
  .pillrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px}
  .pill{background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'Fraunces',serif}
  .pill.on{background:var(--terra);color:#fff;border-color:var(--terra)}

  /* bottom tab bar */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:66px;background:rgba(246,239,228,.94);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);display:none;align-items:center;
    justify-content:space-around;padding:0 8px 8px;z-index:8}
  .tabbar.show{display:flex}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--ink-soft);
    cursor:pointer;flex:1;padding-top:9px;transition:color .15s}
  .tab .ti{font-size:18px;line-height:1}
  .tab.on{color:var(--terra-deep);font-weight:600}
  .screen.tabbed{padding-bottom:80px}

  /* settings rows */
  .segctl{display:flex;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px}
  .segctl .segopt{flex:1;text-align:center;padding:11px;border-radius:11px;font-family:'Fraunces',serif;font-size:15px;cursor:pointer;color:var(--ink-soft)}
  .segctl .segopt.on{background:var(--terra);color:#fff}
  .srow{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.5);border:1px solid var(--line);
    border-radius:14px;padding:15px 16px;margin-bottom:9px;cursor:pointer}
  .srow .si{font-size:18px;flex:0 0 24px;text-align:center}
  .srow .st{flex:1;font-size:15px;font-family:'Fraunces',serif}
  .srow .sarr{color:var(--ink-soft)}
  .seclabel{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin:18px 2px 9px}
  .tag{display:inline-block;background:var(--sage);color:var(--sage-ink);font-size:11px;font-weight:600;
    border-radius:20px;padding:3px 10px;letter-spacing:.5px}

  /* setup wizard */
  .setupbar{display:flex;gap:5px;margin:2px 0 22px}
  .setupbar .s{height:4px;border-radius:3px;flex:1;background:var(--line);transition:background .3s}
  .setupbar .s.on{background:var(--terra)}
  .field{background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:14px;padding:13px 16px;margin-bottom:11px}
  .field label{display:block;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
  .field input,.field textarea{width:100%;border:none;background:none;outline:none;font-family:'Fraunces',serif;font-size:18px;color:var(--ink);resize:none}
  .field input::placeholder,.field textarea::placeholder{color:#c3b6a2}
  .row2{display:flex;gap:11px}.row2 .field{flex:1}
  /* live heat map */
  .map{position:relative;height:300px;border-radius:18px;overflow:hidden;border:1px solid var(--line);
    background:linear-gradient(160deg,#ece6d8,#e4ddcd)}
  .street{position:absolute;background:rgba(255,255,255,.55)}
  .heat{position:absolute;border-radius:50%;filter:blur(9px);pointer-events:none;
    background:radial-gradient(circle,#ffe24d 0%,#ef8a2a 28%,#9b2f7a 56%,rgba(155,47,122,0) 72%)}
  .youring{position:absolute;border-radius:50%;border:2px dashed var(--terra-deep);background:rgba(217,139,107,.1);
    z-index:3;animation:pulse 2.6s infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.1);opacity:.5}}
  .hot{position:absolute;border-radius:50%;cursor:pointer;z-index:4}
  .livebanner{display:flex;align-items:center;gap:10px;background:rgba(217,139,107,.12);border:1px solid var(--terra);
    border-radius:14px;padding:12px 14px;margin-bottom:12px}
  .livedot{width:9px;height:9px;border-radius:50%;background:#d9534f;flex:0 0 9px;animation:pulse 1.5s infinite}
  .sheet{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-top:12px}
  .safety-row{display:flex;gap:12px;margin-bottom:13px}
  .safety-row .ico{font-size:18px;flex:0 0 24px;text-align:center}
  .safety-row .txt{font-size:13px;line-height:1.4}
  .safety-row .txt b{font-family:'Fraunces',serif;font-weight:500;display:block;font-size:14px;margin-bottom:1px}
  /* friends & clubs (green world) */
  .btn.green{background:var(--sage-ink);color:#fff;box-shadow:0 10px 24px -10px rgba(95,113,82,.7)}
  .clubhead{position:relative;margin:-4px -26px 16px;padding:52px 24px 20px;color:#fff;background:linear-gradient(160deg,#8a9a6f,#6f7e54)}
  .clubhead .chback{position:absolute;top:12px;left:16px;color:#fff;background:rgba(255,255,255,.22);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:16px}
  .clubcard{background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:transform .15s}
  .clubcard:active{transform:scale(.99)}
  .count{background:var(--sage);color:var(--sage-ink);font-size:11px;font-weight:600;border-radius:20px;padding:3px 9px;white-space:nowrap}
  .buddy{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:10px}
  .av{width:48px;height:48px;border-radius:50%;flex:0 0 48px}
  .wave{background:var(--sage);color:var(--sage-ink);border:none;border-radius:20px;padding:10px 17px;font-weight:600;font-family:Inter;font-size:13px;cursor:pointer;white-space:nowrap}
  .eventrow{display:flex;gap:13px;align-items:center;background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:9px}
  .eventrow .when{flex:0 0 40px;text-align:center;font-family:'Fraunces',serif;color:var(--sage-ink);line-height:1.1}
  .eventrow .when .d{font-size:10px;text-transform:uppercase;letter-spacing:1px}
  .eventrow .when .t{font-size:17px}
  .toggle{width:46px;height:28px;border-radius:20px;background:var(--sage-ink);position:relative;flex:0 0 46px;cursor:pointer;transition:background .2s}
  .toggle::after{content:'';position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;right:3px;transition:.2s}
  .toggle.off{background:var(--line)}.toggle.off::after{right:21px}
  .trow{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .trow .tt{flex:1}.trow .tt b{font-family:'Fraunces',serif;font-weight:500;font-size:15px;display:block}.trow .tt span{font-size:12px;color:var(--ink-soft)}
  .spotcard{border-radius:16px;overflow:hidden;border:1px solid var(--line);margin-bottom:12px;background:rgba(255,255,255,.5)}
  .spotcard .ph{height:84px}.spotcard .bd{padding:13px 15px}
  .panic{background:#f3d9d4;border:1px solid #e3b0a6;border-radius:16px;padding:16px;margin-bottom:14px}
  .photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .ptile{aspect-ratio:1;border-radius:14px;border:1.5px dashed var(--line);background:rgba(255,255,255,.4);
    display:flex;align-items:center;justify-content:center;color:#c3b6a2;font-size:26px;cursor:pointer;overflow:hidden;position:relative}
  .ptile.filled{border-style:solid;border-color:var(--terra)}
  .ptile img{width:100%;height:100%;object-fit:cover;filter:blur(7px) saturate(.7)}
  .ptile .lock{position:absolute;bottom:6px;right:7px;font-size:13px;filter:none}
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span class="bars">●●●● ✦ ▮▮▮</span></div>
    <div class="screen" id="app"></div>
    <div class="tabbar" id="tabbar"></div>
  </div>
  <div class="cap" id="cap">A full-flow vibe prototype · scripted partner · no backend</div>
</div>

<script>
const FACE_SRC="https://randomuser.me/api/portraits/women/22.jpg";
const FALLBACK="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='#e7c49a'/><circle cx='100' cy='86' r='44' fill='#f0cda6'/><path d='M28 200 C28 150 70 128 100 128 C130 128 172 150 172 200 Z' fill='#caa06f'/><ellipse cx='84' cy='84' rx='5' ry='7' fill='#3a2a22'/><ellipse cx='116' cy='84' rx='5' ry='7' fill='#3a2a22'/><path d='M86 108 q14 12 28 0' stroke='#a85' stroke-width='4' fill='none' stroke-linecap='round'/></svg>`);

const ROUNDS=[
  {q:'A night that drifts till 2am, or home by ten?',a:'A night that drifts till 2am at a diner',b:'Home by ten with tea and a good book',her:'b',echo:'You said diner. Maya picked the book — "someone has to drag the other out."'},
  {q:'Know every road, or get lost?',a:'Know every road on the map',b:'Get pleasantly, completely lost',her:'b',echo:'You both chose lost. Suspicious.'},
  {q:'The same ten books, or only new ones?',a:'Reread the same ten books forever',b:"Only new books — some you'll hate",her:'a',echo:'Split. Maya will defend this in round 4, guaranteed.'},
  {q:'Sing badly and loud, or hum to yourself?',a:'Sing badly and loudly',b:'Hum perfectly, to yourself',her:'a',echo:'You said loud. She said she\'d harmonise.'},
  {q:'First pancake, or wait for the perfect one?',a:'The first pancake, slightly wrong',b:'Wait for the perfect one',her:'a',echo:'You both took the first pancake. Basically a personality match.'},
];
const DEEP=[
  {tag:'Going deeper · 1',q:'When you and someone close land on opposite sides of a moral or political line — how do you want to move through it?',lo:'Open to difference',hi:'Need alignment',her:3,
   herInsight:"Maya can sit with disagreement — but only where she feels respected. Push without that, and she'll close the door.",
   levels:['We can talk about anything — difference is genuinely interesting to me.','I love a good debate. Disagreeing well brings me closer.','I can hold space for it, as long as there\'s real respect.',"Some topics I'd rather we tread lightly around.","I'd honestly rather those conversations didn't come up.",'I\'d only feel at home with someone who feels what I feel.']},
  {tag:'Going deeper · 2',q:'When things get hard between two people, what do you reach for first?',lo:'Talk it out now',hi:'Need space first',her:2,
   herInsight:"Maya wants to mend things early and calmly — she won't let a rift set. Silence reads to her as the problem getting worse.",
   levels:["Talk it out immediately — I can't rest until we're okay.",'Address it soon, calmly, before it sets.','A short pause, then we talk.','I need real space before I can say anything useful.','I retreat for a while; pushing makes it worse.','I go quiet and sort it out on my own.']},
];

const app=document.getElementById('app');
let intent='dating', round=0, log=[], deepIdx=0, deepLog=[];

// served queue — blind until you play. Cards lead with the REASON, never the face.
const MATCHES=[
  {name:'Maya',age:31,photo:'https://randomuser.me/api/portraits/women/22.jpg',reason:'You both flagged <i>Tomorrow, and Tomorrow, and Tomorrow</i> — and you\'re both marathon-training this spring.'},
  {name:'Priya',age:29,photo:'https://randomuser.me/api/portraits/women/44.jpg',reason:'You both quit the city for a year and came back. Different reasons. Same itch.'},
  {name:'Robin',age:34,photo:'https://randomuser.me/api/portraits/women/68.jpg',reason:'She plays cello; you said you\'ve always wanted to learn an instrument. A jigsaw fit.'},
  {name:'Sloane',age:30,photo:'https://randomuser.me/api/portraits/women/12.jpg',reason:'You\'re both going to Oaxaca next spring — three weeks apart.'},
  {name:'Devi',age:32,photo:'https://randomuser.me/api/portraits/women/33.jpg',reason:'You both put "I overthink texts" as the thing you\'d change. Honest.'},
  {name:'Wren',age:28,photo:'https://randomuser.me/api/portraits/women/57.jpg',reason:'Both of you cook when you\'re stressed. Neither of you follows the recipe.'},
  {name:'Iris',age:33,photo:'https://randomuser.me/api/portraits/women/9.jpg',reason:'Same hometown, never met. You left at 18; she left at 22.'},

  const light=log.map(e=>`<div class="why" style="margin-bottom:10px;font-style:normal">
    <div class="serif" style="font-style:italic;color:var(--terra-deep);font-size:13px;margin-bottom:8px">${e.q}</div>
    <div style="font-size:13px"><b style="color:var(--ink-soft)">You</b> · ${e.youText}</div>
    <div style="font-size:13px"><b style="color:var(--ink-soft)">Maya</b> · ${e.herText}</div>
    <div style="font-size:12px;margin-top:7px;color:${e.you===e.her?'var(--sage-ink)':'var(--rose-ink)'}">${e.you===e.her?'◆ you matched':'◇ you differed'}</div></div>`).join('');
  const deep=deepLog.map(e=>{const g=Math.abs(e.you-e.her);return `<div class="why" style="margin-bottom:10px;font-style:normal">
    <div class="serif" style="font-style:italic;color:var(--terra-deep);font-size:13px;margin-bottom:8px">${e.q}</div>
    <div style="font-size:13px"><b style="color:var(--ink-soft)">You</b> · ${e.you} — ${e.levels[e.you-1]}</div>
    <div style="font-size:13px"><b style="color:var(--ink-soft)">Maya</b> · ${e.her} — ${e.levels[e.her-1]}</div>
    <div style="font-size:12px;margin-top:7px;color:${g<=1?'var(--sage-ink)':'var(--rose-ink)'}">${g===0?'◆ identical':g===1?'◆ close':'◇ '+g+' apart'}</div></div>`}).join('');
  app.innerHTML=`<button class="back fade" onclick="hub()">‹ Back</button>
    <h2 class="fade" style="margin-bottom:4px">Where you landed</h2>
    <div class="sub fade" style="margin-bottom:16px">The whole thread, kept. ${aligned()} of ${log.length+deepLog.length} aligned.</div>
    <div class="fade">${light}${deep}</div>`;
}

/* ---------- CHAT — with conversation starters pulled from the game ---------- */
let chatMsgs=null;
// starters are generated FROM what just happened in the game — the app stays the host
const STARTERS=[
  {chip:'Defend round 3 📚',say:"Okay, defend it — rereading the same ten books forever. Go."},
  {chip:'The Oaxaca overlap ✈️',say:"Wait — you're going to Oaxaca too? When? We're three weeks apart."},
  {chip:'Your unhinged round-2 answer',say:"I need you to explain your round-2 answer because it was unhinged and I respect it."},
  {chip:'First pancake solidarity 🥞',say:"First-pancake people unite. Perfectionists are exhausting."},
];
function chat(){
  if(!chatMsgs) chatMsgs=[
    {who:'them',text:`So that pancake debate isn't actually over, is it 🥞`},
  ];
  renderChat();
}
function renderChat(){
  app.className='screen reveal';cap('Even here, the app hands you the thread — nobody starts cold');
  const bubbles=chatMsgs.map(m=>m.who==='them'
    ? `<div class="why" style="align-self:flex-start;max-width:82%;font-style:normal">${m.text}</div>`
    : `<div style="align-self:flex-end;max-width:82%;background:var(--terra);color:#fff;border-radius:16px;padding:12px 15px;font-family:Fraunces;font-size:14.5px">${m.text}</div>`
  ).join('');
  app.innerHTML=`<button class="back fade" onclick="hub()">‹ ${partner.name}</button>
    <div class="partner fade" style="margin-bottom:14px">${dot(40)}<div class="who"><b>${partner.name}</b> · here now</div></div>
    <div class="grow fade" style="display:flex;flex-direction:column;gap:10px;justify-content:flex-end">${bubbles}</div>
    <div class="roundlabel fade" style="margin:16px 0 8px;font-size:11px">Starters from your game — tap one</div>
    <div class="pillrow fade" style="justify-content:flex-start">
      ${STARTERS.map((s,i)=>`<div class="pill" style="font-size:12.5px" onclick="sendStarter(${i})">${s.chip}</div>`).join('')}
    </div>
    <div class="actions fade"><button class="btn soft" onclick="renderChat()">Write your own…</button></div>`;
  requestAnimationFrame(()=>setResolve(1));
}
function sendStarter(i){
  chatMsgs.push({who:'me',text:STARTERS[i].say});
  // a little scripted warmth back
  const replies=["Oh it's ON.","Ha — okay, you actually remembered.","See, this is why the game works.","Dangerous opening. I'm in."];
  chatMsgs.push({who:'them',text:replies[i%replies.length]});
  renderChat();
}

function venueSheet(name,n,ov){
  const s=document.getElementById('vsheet');s.style.textAlign='left';s.style.color='var(--ink)';
  s.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="serif" style="font-size:17px">${name}</div><span class="tag" style="background:#f3d9d4;color:#9c5d52">🔥 warm now</span></div>
    <div class="sub" style="margin-bottom:10px">About <b>${n} people</b> open to meeting here right now${ov?` · <b>${ov}</b> share an overlap with you`:''}.</div>
    ${ov?`<div class="why" style="font-style:normal;font-size:13px;margin-bottom:10px">Someone here is also <i>training for a marathon</i>. We won't say who — but now you've got a way in: <i>"Are you training for a marathon?"</i> beats "hey, you're cute" every time.</div>`:''}
    <div class="cap" style="text-align:left">No names. No dots. No exact spot. Just a reason to say hi — head over and meet someone the old way.</div>`;
}

/* ---------- bottom tab bar ---------- */
function discover(){intent==='friends'?findPeople():matchList()}
function setTabs(active){
  const t=document.getElementById('tabbar');
  const tabs=[['discover','✦','Discover','discover'],['profile','◍','You','profile'],['settings','⚙︎','Settings','settings']];
  t.className='tabbar show';
  t.innerHTML=tabs.map(([k,ic,lbl,fn])=>`<div class="tab ${k===active?'on':''}" onclick="${fn}()"><div class="ti">${ic}</div>${lbl}</div>`).join('');
  app.classList.add('tabbed');
}
function clearTabs(){const t=document.getElementById('tabbar');if(t){t.className='tabbar';}if(app)app.classList.remove('tabbed')}
